name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mmmigrate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Source tests
        run: go test -race ./source/...

      - name: SQLite integration tests
        run: cd driver/sqlite && go test -race ./...

      - name: PostgreSQL integration tests
        run: cd driver/postgres && go test -race ./...
        env:
          MMMIGRATE_TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/mmmigrate_test?sslmode=disable

      - name: Build (sqlite)
        run: go build -tags sqlite .

      - name: Build (postgres)
        run: go build -tags postgres .

      - name: Vet
        run: go vet ./...
