name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        driver: [sqlite, postgres]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          ext=""; if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          name="mmmigrate-${DRIVER}-${GOOS}-${GOARCH}${ext}"
          go build -tags "${DRIVER}" -ldflags="-s -w" -o "dist/${name}" .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          DRIVER: ${{ matrix.driver }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmmigrate-${{ matrix.driver }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
